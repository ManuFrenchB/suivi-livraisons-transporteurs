name: Suivi livraisons

on:
  workflow_dispatch:            # bouton "Run workflow" dans l'onglet Actions
  schedule:
    - cron: '0 6 * * 1-5'       # auto : jours ouvrés a 06:00 UTC (~07-08h France)

permissions:
  contents: write               # autorise le commit du resultat

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dependances
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Lancer le scraper
        run: python scraper_tracking.py commandes.csv suivi_resultats.csv

      - name: Publier le resultat (telechargeable)
        uses: actions/upload-artifact@v4
        with:
          name: suivi_resultats
          path: suivi_resultats.csv

      - name: Committer le resultat dans le depot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add suivi_resultats.csv
          git commit -m "MAJ statuts livraisons ($(date +%F))" || echo "Aucun changement a committer"
          git push
